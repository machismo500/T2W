<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Tales on 2 Wheels</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 2rem;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin: 0 0 0.5rem; }
    p  { color: #9ca3af; margin: 0 0 1.5rem; max-width: 340px; line-height: 1.6; }
    .note {
      background: #1f1f1f;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      max-width: 360px;
      color: #d1d5db;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .note strong { color: #e94560; }
    button {
      margin-top: 1.5rem;
      background: #e94560;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🏍️</div>
  <h1>You're offline</h1>
  <p>No internet connection detected. The page you requested isn't cached yet.</p>
  <div class="note">
    <strong>Live Tracking still works!</strong><br />
    If you're on the live tracking page, your GPS pings are being saved on your device
    and will be uploaded automatically when connectivity is restored.
  </div>
  <button onclick="location.reload()">Try again</button>
</body>
</html>

---
deployment:
  tasks:
    - export PATH=/home/$USER/.nvm/versions/node/v20.20.1/bin:$PATH
    - cd /home/$USER/T2W
    - npm install --production
    - npm run build
    - mkdir -p /home/$USER/public_html
    - /bin/cp -f .htaccess /home/$USER/public_html/.htaccess 2>/dev/null; true
    - mkdir -p /home/$USER/T2W/tmp && touch /home/$USER/T2W/tmp/restart.txt
